version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: resume_analyzer_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: resume_analyzer_redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --save 60 1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 256M

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume_analyzer_backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb+srv://sakethgudapati_db_user:dNIJcyzIYxTfRs5L@cluster0.qu6jdhv.mongodb.net/
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-resume_analyzer_secret_key_change_in_prod}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ENVIRONMENT=production
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume_analyzer_worker
    command: celery -A workers.celery_worker.celery_app worker --loglevel=info --concurrency=4 --queues=default,ai_tasks,embedding_tasks
    environment:
      - MONGO_URI=mongodb+srv://sakethgudapati_db_user:dNIJcyzIYxTfRs5L@cluster0.qu6jdhv.mongodb.net/
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-resume_analyzer_secret_key_change_in_prod}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - ENVIRONMENT=production
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A workers.celery_worker.celery_app inspect ping || exit 1"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1.5G

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume_analyzer_beat
    command: celery -A workers.celery_worker.celery_app beat --loglevel=info --scheduler celery.beat:PersistentScheduler
    environment:
      - MONGO_URI=mongodb+srv://sakethgudapati_db_user:dNIJcyzIYxTfRs5L@cluster0.qu6jdhv.mongodb.net/
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=${JWT_SECRET:-resume_analyzer_secret_key_change_in_prod}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ./uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume_analyzer_flower
    command: celery -A workers.celery_worker.celery_app flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    ports:
      - "5555:5555"
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
      - celery_worker
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resume_analyzer_frontend
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:80 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  mongodb_data:
    driver: local

networks:
  default:
    name: resume_ai_network
    driver: bridge
