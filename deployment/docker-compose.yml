version: '3.8'

services:
  app:
    build: .
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
    volumes:
      - ./uploads:/app/uploads
      - ./reports:/app/reports
    depends_on:
      - db

  db:
    image: postgres:14
    environment:
      - POSTGRES_DB=resume_analyzer
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
