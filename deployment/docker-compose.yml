version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: resume_analyzer_db
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: resume_analyzer_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: resume_analyzer_backend
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=mongodb+srv://sakethgudapati_db_user:dNIJcyzIYxTfRs5L@cluster0.qu6jdhv.mongodb.net/
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=resume_analyzer_secret_key
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ../uploads:/app/uploads
    depends_on:
      - mongodb
      - redis
    restart: unless-stopped

  celery_worker:
    build:
      context: ../
      dockerfile: Dockerfile
    container_name: resume_analyzer_worker
    command: celery -A workers.celery_worker.celery_app worker --loglevel=info
    environment:
      - MONGO_URI=mongodb+srv://sakethgudapati_db_user:dNIJcyzIYxTfRs5L@cluster0.qu6jdhv.mongodb.net/
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET=resume_analyzer_secret_key
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - ../uploads:/app/uploads
    depends_on:
      - redis
      - mongodb
    restart: unless-stopped

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: resume_analyzer_frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  mongodb_data:
