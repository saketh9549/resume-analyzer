services:
  - type: web
    name: resume-analyzer
    runtime: python
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.10
    disk:
      name: uploads
      mountPath: /app/uploads
      sizeGB: 10
